<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sierra Madre Advocacy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f7f6;
      color: #2c3e50;
    }

    /* Hero Section Styles */
    .hero-section {
      position: relative;
      width: 100%;
      height: 100vh;
      background-image: url('https://www.facebook.com/photo/?fbid=1501517177243684&set=pcb.1501517383910330'); /* Add your image link here */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    /* Dark semi-transparent overlay */
    .hero-section::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.6); /* 0.6 is the 60% opacity */
      z-index: 1;
    }

    /* Content styling to sit above the overlay */
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      padding: 20px;
    }

    .hero-content h1 {
      font-size: 4rem;
      margin: 0 0 20px 0;
    }

    .hero-content p {
      font-size: 1.25rem;
      line-height: 1.6;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- Hero Section -->
  <section class="hero-section">
    <div class="hero-content">
      <h1>Sierra Madre</h1>
      <p>An interactive educational and advocacy platform dedicated to preserving the Sierra Madre mountain range.</p>
    </div>
  </section>

</body>
</html>
